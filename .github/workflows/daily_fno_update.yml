name: Daily F&O Analysis Update

on:
  schedule:
    # 7:30 PM IST = 14:00 UTC (runs Monday to Friday)
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Need permission to push back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas plotly requests

      - name: Run Cleanup (1st of Month)
        run: |
          python cleanup_old_csvs.py

      - name: Run Fetch and Analysis
        run: |
          python run_fno_analysis.py --auto

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No new data to commit."
          else
            git commit -m "Auto-update F&O Dashboard and Data [skip ci]"
            git push
          fi
